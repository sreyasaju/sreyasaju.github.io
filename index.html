<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/src/style.css" /> 
    <title>Sreya Saju</title>
  </head>
  <body class="bg-[#101029] min-h-screen flex items-center justify-center p-8">

    <section class="w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-12 md:gap-24">
        
        <div class="w-60 h-60 md:w-80 md:h-80 rounded-full shrink-0 overflow-hidden">
            <img src="src/assets/sreyasaju.jpeg" alt="Sreya Saju" class="w-full h-full object-cover">
        </div>

        <div class="flex flex-col max-w-lg text-center md:text-left space-y-6">
            <h1 id="gradient-text" 
                class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight leading-tight bg-clip-text text-transparent"
                style="background-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #BCBCFF 0%, #998eff 100%);">
              hello!<br>I’m Sreya Saju
            </h1>
            <p class="text-lg md:text-xl text-violet-50 leading-relaxed">
              A school kid, Open Source Developer, Graphic Designer, working primarily with 
              <span class="underline decoration-2 decoration-[#B2A4FF] font-semibold">Python</span>, 
              creating interesting software to learn something new everyday!
            </p>

            <div class="flex items-center justify-center md:justify-start gap-4 pt-2">
              <button type="button" aria-label="github" class="w-8 h-8 rounded-xl text-xl text-[#202053] bg-[#B2A4FF] transition-transform hover:scale-120 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#B2A4FF]">
                <i class="fa-brands fa-github"></i>
              </button>
              <button type="button" aria-label="linkedin" class="w-8 h-8 rounded-xl text-xl text-[#202053] bg-[#B2A4FF] transition-transform hover:scale-120 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#B2A4FF]">
                <i class="fa-brands fa-linkedin"></i>
              </button>
              <button type="button" aria-label="gitlab" class="w-8 h-8 rounded-xl text-xl text-[#202053] bg-[#B2A4FF] transition-transform hover:scale-120 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#B2A4FF]">
                <i class="fa-brands fa-gitlab"></i>
              </button>
              <button type="button" aria-label="mastodon" class="w-8 h-8 rounded-xl text-xl text-[#202053] bg-[#B2A4FF] transition-transform hover:scale-120 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#B2A4FF]">
                <i class="fa-brands fa-mastodon">
                </i>
              </button>
            </div>
        </div>

    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
